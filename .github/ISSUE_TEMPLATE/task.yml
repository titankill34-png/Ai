name: Agent task
description: A unit of work for one Claude Code agent to claim
title: "[lane] "
labels: ["task"]
body:
  - type: dropdown
    id: lane
    attributes:
      label: Lane
      options:
        - "lane:tony — UI only"
        - "lane:jimmy — core, data, tests, build, pbxproj"
        - "contract-change — needs approval from both lanes"
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: Describe the outcome, not the steps.
      placeholder: "Login screen calls AuthService.signIn and shows an inline error on bad credentials."
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: Files expected to change
      description: If any file falls outside your lane, open a separate issue for the other lane instead.
      placeholder: |
        Sources/UI/Login/LoginView.swift
        Sources/UI/Login/LoginViewModel.swift
    validations:
      required: true

  - type: textarea
    id: contract
    attributes:
      label: Contract used
      description: Protocols in Sources/Contracts/ this task depends on.
      placeholder: "AuthServicing.signIn(email:password:) async throws -> Session"

  - type: textarea
    id: done
    attributes:
      label: Definition of done
      value: |
        - [ ] Local build passes (CLAUDE.md section 5)
        - [ ] CI green
        - [ ] No files touched outside this lane
    validations:
      required: true

  - type: input
    id: blocked_by
    attributes:
      label: Blocked by
      placeholder: "#12 or none"
