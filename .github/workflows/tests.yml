name: Unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  SCHEME: Nicora
  PROJECT_FILE: Nicora.xcodeproj

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Use the runner's default Xcode: GitHub guarantees its iOS simulator
      # runtime is installed (a pinned Xcode may be missing the sim runtime).
      - name: Show Xcode
        run: xcodebuild -version

      - name: Pick an available iPhone simulator
        id: sim
        run: |
          set -eo pipefail
          UDID=$(xcrun simctl list devices available -j | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; ids=[x['udid'] for rt in d for x in d[rt] if x.get('isAvailable') and 'iPhone' in x['name']]; print(ids[0] if ids else '')")
          test -n "$UDID" || { echo '::error::no iPhone simulator available'; exit 1; }
          echo "Using simulator $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: |
          set -eo pipefail
          xcodebuild test \
            -project "${PROJECT_FILE}" \
            -scheme "${SCHEME}" \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify
